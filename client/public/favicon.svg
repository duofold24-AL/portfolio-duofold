<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#800020;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff7aa2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="48" fill="#0b0b0f" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Outer triangle (low opacity) -->
  <path d="M50 10L90 80H10L50 10Z" stroke="white" stroke-width="4" stroke-linejoin="round" opacity="0.3"/>

  <!-- Second triangle outline -->
  <path d="M50 15L85 75H15L50 15Z" stroke="white" stroke-width="2" opacity="0.5"/>

  <!-- Spinning dashed circle replaced with static for favicon -->
  <circle cx="50" cy="53" r="25" stroke="url(#accentGrad)" stroke-width="6" stroke-dasharray="10 5" opacity="0.9"/>

  <!-- Core filled triangle -->
  <path d="M50 25L70 65H30L50 25Z" fill="white" filter="url(#glow)"/>
</svg>